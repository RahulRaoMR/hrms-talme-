services:
  - type: web
    name: hrms-talme-frontend
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: NEXT_PUBLIC_FRONTEND_URL
        value: https://hrms.talme.in
      - key: EMAIL_PROVIDER
        value: gmail
      - key: EMAIL_SERVICE
        value: gmail
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: RESEND_API_KEY
        sync: false
      - key: ATS_SHAREPOINT_SYNC_ENABLED
        value: "false"
      - key: MICROSOFT_TENANT_ID
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: ATS_SHAREPOINT_WORKBOOK_URL
        sync: false
      - key: ATS_SHAREPOINT_DRIVE_ID
        sync: false
      - key: ATS_SHAREPOINT_ITEM_ID
        sync: false
      - key: ATS_SHAREPOINT_REQUIREMENTS_SHEET
        value: Requirement Overview
      - key: ATS_SHAREPOINT_CANDIDATES_SHEET
        value: Candidate Master
      - key: ATS_SHAREPOINT_IMPORT_INTERVAL_MS
        value: "60000"

  - type: web
    name: talme-hrms-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma migrate deploy && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: STORAGE_PROVIDER
        value: local
      - key: EMAIL_PROVIDER
        value: gmail
      - key: EMAIL_SERVICE
        value: gmail
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: RESEND_API_KEY
        sync: false
      - key: ATS_SHAREPOINT_SYNC_ENABLED
        value: "false"
      - key: MICROSOFT_TENANT_ID
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: ATS_SHAREPOINT_WORKBOOK_URL
        sync: false
      - key: ATS_SHAREPOINT_DRIVE_ID
        sync: false
      - key: ATS_SHAREPOINT_ITEM_ID
        sync: false
      - key: ATS_SHAREPOINT_REQUIREMENTS_SHEET
        value: Requirement Overview
      - key: ATS_SHAREPOINT_CANDIDATES_SHEET
        value: Candidate Master
      - key: ATS_SHAREPOINT_IMPORT_INTERVAL_MS
        value: "60000"
